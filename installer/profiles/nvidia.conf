# =============================================================================
# Profiel: nvidia
# =============================================================================
# Instellingen voor systemen met een Nvidia GPU.
# Erft alles van default, overschrijft Nvidia-specifieke opties.

# shellcheck source=default.conf
source "$(dirname "${BASH_SOURCE[0]}")/default.conf"

# Nvidia Wayland omgevingsvariabelen
# Deze worden toegepast in config/hypr/conf.d/10-environment-nvidia.conf
GPU_ENV_VARS="
LIBVA_DRIVER_NAME=nvidia
__GLX_VENDOR_LIBRARY_NAME=nvidia
GBM_BACKEND=nvidia-drm
__NV_PRIME_RENDER_OFFLOAD=1
NVD_BACKEND=direct
"

# Video wallpapers werken op Nvidia met mpvpaper maar vereisen extra configuratie
ENABLE_VIDEO_WALLPAPER=false    # Zet op true als je mpvpaper goed werkend hebt

# Cursor fix voor Nvidia
NVIDIA_CURSOR_FIX=true

# Expliciete render node
NVIDIA_DRM_MODESET=true
