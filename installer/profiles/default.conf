# =============================================================================
# Profiel: default
# =============================================================================
# Standaardinstellingen voor een gewone desktop zonder Nvidia of laptop-specifieke opties.

# Wallpaper backends
ENABLE_VIDEO_WALLPAPER=true   # mpvpaper — alleen aanzetten als gewenst
ENABLE_STATIC_WALLPAPER=true   # hyprpaper — altijd aan

# Theming
MATUGEN_ENABLED=true
MATUGEN_COLOR_INDEX=0          # 0 = primaire kleur uit wallpaper

# Session
ENABLE_FINGERPRINT=false        # fprintd — alleen aanzetten als je scanner hebt
ENABLE_SDDM=true

# GPU-specifieke Hyprland env-variabelen
# (worden ingesteld in 70-autostart of environment.conf)
GPU_ENV_VARS=""

# Laptop-specifieke features
ENABLE_POWER_PROFILES=false
ENABLE_BRIGHTNESS_CONTROL=false
TOUCHPAD_NATURAL_SCROLL=true

# Optionele app-integraties
ENABLE_SPICETIFY=false
ENABLE_VESKTOP=false
