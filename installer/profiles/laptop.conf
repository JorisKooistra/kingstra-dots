# =============================================================================
# Profiel: laptop
# =============================================================================
# Instellingen voor laptops — voegt power management en touchpad-opties toe.

# shellcheck source=default.conf
source "$(dirname "${BASH_SOURCE[0]}")/default.conf"

# Laptop-specifieke features
ENABLE_POWER_PROFILES=true      # power-profiles-daemon
ENABLE_BRIGHTNESS_CONTROL=true  # brightnessctl
TOUCHPAD_NATURAL_SCROLL=true

# Slaap-/slotgedrag
IDLE_TIMEOUT_LOCK=300           # seconden tot schermvergrendeling
IDLE_TIMEOUT_SLEEP=600          # seconden tot suspend

# Vingerafdruk: auto-enablen als er een scanner is
if [[ "${HAS_FINGERPRINT:-nee}" == "ja" ]]; then
    ENABLE_FINGERPRINT=true
fi

# Schermhelderheid bij lock
LOCK_DIM_BRIGHTNESS=20          # % helderheid tijdens idle-dim

# Video wallpapers op laptop: standaard uit (batterijverbruik)
ENABLE_VIDEO_WALLPAPER=false
