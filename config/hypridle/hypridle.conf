# =============================================================================
# hypridle.conf — Idle daemon configuratie
# =============================================================================
# Tijden zijn in seconden.
# Fase 12 voegt wifi/bluetooth scan na resume toe (apart script).
# =============================================================================

general {
    # Vergrendelscherm via Quickshell (WlSessionLock + PAM)
    lock_cmd         = bash ~/.config/hypr/scripts/lock.sh
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# ---------------------------------------------------------------------------
# 3 min — scherm dimmen (helderheid 10%)
# ---------------------------------------------------------------------------
listener {
    timeout   = 180
    on-timeout = brightnessctl -s s 10%
    on-resume  = brightnessctl -r
}

# ---------------------------------------------------------------------------
# 5 min — sessie vergrendelen
# ---------------------------------------------------------------------------
listener {
    timeout   = 300
    on-timeout = loginctl lock-session
    on-resume  = hyprctl dispatch dpms on
}

# ---------------------------------------------------------------------------
# 8 min — scherm uitzetten (DPMS off)
# ---------------------------------------------------------------------------
listener {
    timeout   = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ---------------------------------------------------------------------------
# 30 min — suspend
# ---------------------------------------------------------------------------
listener {
    timeout   = 1800
    on-timeout = systemctl suspend
}
