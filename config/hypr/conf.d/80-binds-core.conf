# =============================================================================
# 80-binds-core.conf — Kern workflow: vensters, werkruimtes, sessie
# =============================================================================

$mainMod = SUPER
$scripts = ~/.config/hypr/scripts

# ---------------------------------------------------------------------------
# Vensters — focus
# ---------------------------------------------------------------------------
bind = $mainMod, H,     movefocus, l   # Focus naar links
bind = $mainMod, L,     movefocus, r   # Focus naar rechts
bind = $mainMod, K,     movefocus, u   # Focus omhoog
bind = $mainMod, J,     movefocus, d   # Focus omlaag
bind = $mainMod, left,  exec, $scripts/focus-direction-safe.sh l   # Focus links (incl. monitor fallback)
bind = $mainMod, right, exec, $scripts/focus-direction-safe.sh r   # Focus rechts (incl. monitor fallback)
bind = $mainMod, up,    exec, $scripts/focus-direction-safe.sh u   # Focus omhoog (incl. monitor fallback)
bind = $mainMod, down,  exec, $scripts/focus-direction-safe.sh d   # Focus omlaag (incl. monitor fallback)

# ---------------------------------------------------------------------------
# Vensters — verplaatsen
# ---------------------------------------------------------------------------
bind  = $mainMod SHIFT, H,     movewindow, l   # Venster naar links
bind  = $mainMod SHIFT, L,     movewindow, r   # Venster naar rechts
bind  = $mainMod SHIFT, K,     movewindow, u   # Venster omhoog
bind  = $mainMod SHIFT, J,     movewindow, d   # Venster omlaag
bind  = $mainMod SHIFT, left,  movewindow, l   # Venster naar links
bind  = $mainMod SHIFT, right, movewindow, r   # Venster naar rechts
bind  = $mainMod SHIFT, up,    movewindow, u   # Venster omhoog
bind  = $mainMod SHIFT, down,  movewindow, d   # Venster omlaag

# Verslepen en aanpassen via muis
bindm = $mainMod, mouse:272, movewindow     # Venster verslepen
bindm = $mainMod, mouse:273, resizewindow   # Venster aanpassen (muis)

# ---------------------------------------------------------------------------
# Vensters — aanpassen
# ---------------------------------------------------------------------------
binde = $mainMod CTRL, right, resizeactive,  60  0   # Breder maken
binde = $mainMod CTRL, left,  resizeactive, -60  0   # Smaller maken
binde = $mainMod CTRL, up,    resizeactive,   0 -60  # Korter maken
binde = $mainMod CTRL, down,  resizeactive,   0  60  # Hoger maken

# ---------------------------------------------------------------------------
# Vensters — toestand
# ---------------------------------------------------------------------------
bind = $mainMod,       Q, killactive                       # Venster sluiten
bind = $mainMod,       F, fullscreen, 0                    # Volledig scherm
bind = $mainMod,       M, fullscreen, 1                    # Maximaliseren
bind = $mainMod,       T, exec, $scripts/togglefloating-safe.sh   # Zwevend wisselen (Quickshell geforceerd floating)
bind = $mainMod SHIFT, T, exec, $scripts/theme-next-safe.sh        # Volgend thema toepassen
bind = $mainMod ALT,   T, pin                              # Venster vastzetten op alle workspaces
bind = $mainMod,       P, pseudo                           # Pseudo-tiling
bind = $mainMod, backslash, layoutmsg, togglesplit         # Split-richting wisselen
bind = $mainMod SHIFT, Space, centerwindow                 # Venster centreren

# ---------------------------------------------------------------------------
# Vensters — groepen (tabs)
# ---------------------------------------------------------------------------
bind = $mainMod,       G, togglegroup                  # Groepsmodus wisselen
bind = $mainMod ALT,   right, changegroupactive, f     # Volgende groepstab
bind = $mainMod ALT,   left,  changegroupactive, b     # Vorige groepstab
bind = $mainMod CTRL SHIFT, G, lockactivegroup, toggle      # Groep vergrendelen
bind = $mainMod SHIFT, G, moveoutofgroup               # Uit groep halen

# ---------------------------------------------------------------------------
# Werkruimtes — navigeren
# ---------------------------------------------------------------------------
bind = $mainMod, 1, exec, $scripts/workspace-action.sh workspace 1    # Werkruimte 1
bind = $mainMod, 2, exec, $scripts/workspace-action.sh workspace 2    # Werkruimte 2
bind = $mainMod, 3, exec, $scripts/workspace-action.sh workspace 3    # Werkruimte 3
bind = $mainMod, 4, exec, $scripts/workspace-action.sh workspace 4    # Werkruimte 4
bind = $mainMod, 5, exec, $scripts/workspace-action.sh workspace 5    # Werkruimte 5
bind = $mainMod, 6, exec, $scripts/workspace-action.sh workspace 6    # Werkruimte 6
bind = $mainMod, 7, exec, $scripts/workspace-action.sh workspace 7    # Werkruimte 7
bind = $mainMod, 8, exec, $scripts/workspace-action.sh workspace 8    # Werkruimte 8
bind = $mainMod, 9, exec, $scripts/workspace-action.sh workspace 9    # Werkruimte 9
bind = $mainMod, 0, exec, $scripts/workspace-action.sh workspace 10   # Werkruimte 10

bind = $mainMod, mouse_down, workspace, e+1       # Volgende werkruimte (scroll)
bind = $mainMod, mouse_up,   workspace, e-1       # Vorige werkruimte (scroll)
bind = $mainMod, Tab,        exec, qs ipc -c overview call overview toggle      # Workspace-overzicht
bind = ALT,      Tab,        workspace, previous   # Vorige werkruimte

# ---------------------------------------------------------------------------
# Werkruimtes — venster verplaatsen
# ---------------------------------------------------------------------------
bind = $mainMod SHIFT, 1, exec, $scripts/workspace-action.sh movetoworkspace 1    # Verplaats naar werkruimte 1
bind = $mainMod SHIFT, 2, exec, $scripts/workspace-action.sh movetoworkspace 2    # Verplaats naar werkruimte 2
bind = $mainMod SHIFT, 3, exec, $scripts/workspace-action.sh movetoworkspace 3    # Verplaats naar werkruimte 3
bind = $mainMod SHIFT, 4, exec, $scripts/workspace-action.sh movetoworkspace 4    # Verplaats naar werkruimte 4
bind = $mainMod SHIFT, 5, exec, $scripts/workspace-action.sh movetoworkspace 5    # Verplaats naar werkruimte 5
bind = $mainMod SHIFT, 6, exec, $scripts/workspace-action.sh movetoworkspace 6    # Verplaats naar werkruimte 6
bind = $mainMod SHIFT, 7, exec, $scripts/workspace-action.sh movetoworkspace 7    # Verplaats naar werkruimte 7
bind = $mainMod SHIFT, 8, exec, $scripts/workspace-action.sh movetoworkspace 8    # Verplaats naar werkruimte 8
bind = $mainMod SHIFT, 9, exec, $scripts/workspace-action.sh movetoworkspace 9    # Verplaats naar werkruimte 9
bind = $mainMod SHIFT, 0, exec, $scripts/workspace-action.sh movetoworkspace 10   # Verplaats naar werkruimte 10

# Stil verplaatsen (focus blijft op huidige werkruimte)
bind = $mainMod ALT, 1, exec, $scripts/workspace-action.sh movetoworkspacesilent 1    # Stil naar werkruimte 1
bind = $mainMod ALT, 2, exec, $scripts/workspace-action.sh movetoworkspacesilent 2    # Stil naar werkruimte 2
bind = $mainMod ALT, 3, exec, $scripts/workspace-action.sh movetoworkspacesilent 3    # Stil naar werkruimte 3
bind = $mainMod ALT, 4, exec, $scripts/workspace-action.sh movetoworkspacesilent 4    # Stil naar werkruimte 4
bind = $mainMod ALT, 5, exec, $scripts/workspace-action.sh movetoworkspacesilent 5    # Stil naar werkruimte 5
bind = $mainMod ALT, 6, exec, $scripts/workspace-action.sh movetoworkspacesilent 6    # Stil naar werkruimte 6
bind = $mainMod ALT, 7, exec, $scripts/workspace-action.sh movetoworkspacesilent 7    # Stil naar werkruimte 7
bind = $mainMod ALT, 8, exec, $scripts/workspace-action.sh movetoworkspacesilent 8    # Stil naar werkruimte 8
bind = $mainMod ALT, 9, exec, $scripts/workspace-action.sh movetoworkspacesilent 9    # Stil naar werkruimte 9
bind = $mainMod ALT, 0, exec, $scripts/workspace-action.sh movetoworkspacesilent 10   # Stil naar werkruimte 10

# ---------------------------------------------------------------------------
# Speciale werkruimte (scratchpad)
# ---------------------------------------------------------------------------
bind = $mainMod,       S, togglespecialworkspace, magic    # Scratchpad wisselen
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic   # Naar scratchpad

# ---------------------------------------------------------------------------
# Sessie
# ---------------------------------------------------------------------------
bind = $mainMod CTRL, L, exec, bash ~/.config/hypr/scripts/lock.sh   # Scherm vergrendelen
bindl = , switch:on:Lid Switch, exec, bash ~/.config/hypr/scripts/lock.sh   # Laptop dichtklappen vergrendelt scherm
bind = $mainMod CTRL, R, exec, hyprctl reload   # Config herladen
bind = $mainMod CTRL, backspace, exit            # Sessie afsluiten
