# =============================================================================
# 83-binds-media.conf — Audio, helderheid, media-toetsen
# =============================================================================

# ---------------------------------------------------------------------------
# Volume (via SwayOSD voor visuele feedback)
# ---------------------------------------------------------------------------
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise       # Volume omhoog
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower       # Volume omlaag
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle  # Geluid dempen
bindl  = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle   # Microfoon dempen

# Fallback zonder SwayOSD
# bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ---------------------------------------------------------------------------
# Helderheid (via SwayOSD)
# ---------------------------------------------------------------------------
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise   # Helderheid omhoog
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower   # Helderheid omlaag

# ---------------------------------------------------------------------------
# Media — playerctl
# ---------------------------------------------------------------------------
bindl = , XF86AudioPlay,  exec, playerctl play-pause   # Afspelen/pauzeren
bindl = , XF86AudioPause, exec, playerctl play-pause   # Afspelen/pauzeren
bindl = , XF86AudioNext,  exec, playerctl next         # Volgend nummer
bindl = , XF86AudioPrev,  exec, playerctl previous     # Vorig nummer
bindl = , XF86AudioStop,  exec, playerctl stop         # Stoppen

# Keyboard-snelkoppelingen voor media (zonder speciale toetsen)
bind = $mainMod ALT, P, exec, playerctl play-pause     # Afspelen/pauzeren
bind = $mainMod ALT, period, exec, playerctl next      # Volgend nummer
bind = $mainMod ALT, comma,  exec, playerctl previous  # Vorig nummer
