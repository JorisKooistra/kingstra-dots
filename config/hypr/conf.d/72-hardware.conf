# =============================================================================
# 72-hardware.conf — Automatisch gegenereerd door fase 14
# Gegenereerd op: 2026-04-07 19:57
# GPU: intel | Laptop: true | Touchpad: true
# =============================================================================

# ---------------------------------------------------------------------------
# Intel GPU — VA-API driver
# ---------------------------------------------------------------------------
env = LIBVA_DRIVER_NAME,iHD

# ---------------------------------------------------------------------------
# Touchpad-instellingen (laptop)
# ---------------------------------------------------------------------------
input {
    touchpad {
        natural_scroll = true
        scroll_factor = 0.8
        tap-to-click = true
        tap-and-drag = true
        disable_while_typing = true
        drag_lock = false
    }
}

# ---------------------------------------------------------------------------
# Laptop — lichtere decoraties (batterijbesparing)
# ---------------------------------------------------------------------------
decoration {
    blur {
        passes = 2
        size   = 6
    }
}

