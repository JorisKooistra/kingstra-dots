# =============================================================================
# 71-autostart-ui.conf — UI-laag autostart
# Aangemaakt door fase 5 (ui_quickshell)
# =============================================================================

# ---------------------------------------------------------------------------
# Wallpaper daemon
# ---------------------------------------------------------------------------
exec-once = hyprpaper

# ---------------------------------------------------------------------------
# Quickshell topbar
# ---------------------------------------------------------------------------
exec-once = quickshell -p ~/.config/quickshell/shell.qml

# ---------------------------------------------------------------------------
# OSD daemon (volume/brightness overlay via SwayOSD)
# ---------------------------------------------------------------------------
exec-once = swayosd-server
