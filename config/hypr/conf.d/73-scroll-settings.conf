# =============================================================================
# 73-scroll-settings.conf — Scroll-tuning overrides
# =============================================================================
# Aangepast via de Settings-popup. Houd deze defaults in sync met:
#   - 20-input.conf
#   - installer/phases/14_profiles.sh
# =============================================================================

input {
    scroll_factor = 1.35

    touchpad {
        scroll_factor = 0.65
    }
}
