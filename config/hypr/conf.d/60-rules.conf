# =============================================================================
# 60-rules.conf — Window rules en workspace-regels
# =============================================================================

# ---------------------------------------------------------------------------
# Floating dialogs en hulpvensters
# ---------------------------------------------------------------------------
windowrule = float, class:(pavucontrol)
windowrule = float, class:(blueman-manager)
windowrule = float, class:(nm-connection-editor)
windowrule = float, class:(polkit-gnome-authentication-agent-1)
windowrule = float, class:(xdg-desktop-portal-gtk)
windowrule = float, class:(org.gnome.Nautilus), title:(Bestandseigenschappen)
windowrule = float, class:(org.gnome.Nautilus), title:(File Properties)
windowrule = float, title:(Open File)
windowrule = float, title:(Open Folder)
windowrule = float, title:(Save File)
windowrule = float, title:(Save As)
windowrule = float, title:(Confirm)
windowrule = float, title:(Picture-in-Picture)
windowrule = float, title:(^(Media viewer)$)

# ---------------------------------------------------------------------------
# Grootte van floating vensters
# ---------------------------------------------------------------------------
windowrule = size 800 600, class:(pavucontrol)
windowrule = size 900 700, class:(blueman-manager)
windowrule = center, class:(pavucontrol)
windowrule = center, class:(blueman-manager)

# ---------------------------------------------------------------------------
# Opacity per app
# ---------------------------------------------------------------------------
windowrule = opacity 0.95 0.88, class:(kitty)
windowrule = opacity 1.0  1.0,  class:(Hyprland)
windowrule = opacity 1.0  1.0,  fullscreen:1

# ---------------------------------------------------------------------------
# Blur uitschakelen voor specifieke apps (performance)
# ---------------------------------------------------------------------------
windowrule = noblur, class:(com.mitchellh.ghostty)   # Ghostty heeft eigen blur
windowrule = noblur, title:(YouTube)

# ---------------------------------------------------------------------------
# Picture-in-picture
# ---------------------------------------------------------------------------
windowrule = float,       title:(Picture-in-Picture)
windowrule = pin,         title:(Picture-in-Picture)
windowrule = move 69% 4%, title:(Picture-in-Picture)
windowrule = size 25% 25%, title:(Picture-in-Picture)
windowrule = keepaspectratio, title:(Picture-in-Picture)

# ---------------------------------------------------------------------------
# Workspace-toewijzingen
# ---------------------------------------------------------------------------
windowrule = workspace 2, class:(firefox)
windowrule = workspace 2, class:(zen-browser)
windowrule = workspace 3, class:(org.gnome.Nautilus)
windowrule = workspace 9, class:(Spotify)
windowrule = workspace 9, class:(spotify)
windowrule = workspace 10, class:(discord)
windowrule = workspace 10, class:(vesktop)

# ---------------------------------------------------------------------------
# SwayNC — altijd bovenop, geen rand
# ---------------------------------------------------------------------------
layerrule = blur,         swaync-control-center
layerrule = blur,         swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window

# ---------------------------------------------------------------------------
# Walker launcher
# ---------------------------------------------------------------------------
layerrule = blur,         walker
layerrule = ignorealpha 0.3, walker

# ---------------------------------------------------------------------------
# Quickshell top bar — geen schaduwen, blur eronder
# ---------------------------------------------------------------------------
layerrule = noanim,       quickshell
