# =============================================================================
# 60-rules.conf — Window rules en workspace-regels
# Hyprland 0.53+ syntax: windowrule = match:class naam, regel on
# =============================================================================

# ---------------------------------------------------------------------------
# Floating dialogs en hulpvensters
# ---------------------------------------------------------------------------
windowrule = match:class pavucontrol,                         float on, size 800 600, center on
windowrule = match:class blueman-manager,                     float on, size 900 700, center on
windowrule = match:class nm-connection-editor,                float on
windowrule = match:class polkit-gnome-authentication-agent-1, float on
windowrule = match:class xdg-desktop-portal-gtk,              float on
windowrule = match:class org.gnome.Nautilus match:title (Bestandseigenschappen|File Properties), float on
windowrule = match:title ^(Open File|Open Folder|Save File|Save As|Confirm)$, float on

# ---------------------------------------------------------------------------
# Picture-in-picture
# ---------------------------------------------------------------------------
windowrule = match:title ^(Picture-in-Picture)$, float on, pin on, move 69% 4%, size 25% 25%, keep_aspect_ratio on

# ---------------------------------------------------------------------------
# Media viewer
# ---------------------------------------------------------------------------
windowrule = match:title ^(Media viewer)$, float on

# ---------------------------------------------------------------------------
# Opacity per app
# ---------------------------------------------------------------------------
windowrule = match:class kitty,     opacity 0.95 0.88
windowrule = match:class Hyprland,  opacity 1.0 1.0
windowrule = match:fullscreen true, opacity 1.0

# ---------------------------------------------------------------------------
# Blur uitschakelen voor specifieke apps
# ---------------------------------------------------------------------------
windowrule = match:class com.mitchellh.ghostty, no_blur on
windowrule = match:title YouTube,               no_blur on

# ---------------------------------------------------------------------------
# Workspace-toewijzingen
# ---------------------------------------------------------------------------
windowrule = match:class firefox,           workspace 2
windowrule = match:class zen-browser,       workspace 2
windowrule = match:class org.gnome.Nautilus, workspace 3
windowrule = match:class [Ss]potify,        workspace 9
windowrule = match:class discord,           workspace 10
windowrule = match:class vesktop,           workspace 10

# ---------------------------------------------------------------------------
# SwayNC — notificatie-laag (geen blur overlay over het scherm)
# ---------------------------------------------------------------------------
layerrule = no_anim on, match:namespace swaync-control-center
layerrule = no_anim on, match:namespace swaync-notification-window

# ---------------------------------------------------------------------------
# Walker launcher
# ---------------------------------------------------------------------------
layerrule = blur on, match:namespace walker

# ---------------------------------------------------------------------------
# Quickshell — qs-master popup window moet floating zijn
# Zonder deze regel tiled Hyprland het window en vult het het volledige scherm
# ---------------------------------------------------------------------------
windowrule = match:title ^(qs-master)$, float on, no_blur on, no_shadow on, border_size 0, no_initial_focus on

# ---------------------------------------------------------------------------
# Quickshell top bar — geen animaties
# ---------------------------------------------------------------------------
layerrule = no_anim on, match:namespace quickshell
