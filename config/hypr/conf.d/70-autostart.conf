# =============================================================================
# 70-autostart.conf — Autostart
# =============================================================================
# Fase 3: minimale kern (geen UI-laag)
# Fase 5 voegt Quickshell toe via 71-autostart-ui.conf (aangemaakt in fase 5)
# =============================================================================

# ---------------------------------------------------------------------------
# Authenticatie
# ---------------------------------------------------------------------------
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ---------------------------------------------------------------------------
# XDG-portalen (volgorde is belangrijk: Hyprland eerst)
# ---------------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = /usr/lib/xdg-desktop-portal &

# ---------------------------------------------------------------------------
# Audio
# ---------------------------------------------------------------------------
exec-once = systemctl --user start pipewire pipewire-pulse wireplumber

# ---------------------------------------------------------------------------
# Klembord
# ---------------------------------------------------------------------------
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ---------------------------------------------------------------------------
# Netwerk applet (beheert WiFi-wachtwoordprompts, geen tray vereist)
# ---------------------------------------------------------------------------
exec-once = nm-applet --indicator

# ---------------------------------------------------------------------------
# Notificaties (SwayNC — fase 6 voegt de volledige config toe)
# ---------------------------------------------------------------------------
exec-once = swaync

# ---------------------------------------------------------------------------
# Idle daemon (fase 10 schrijft hypridle.conf)
# ---------------------------------------------------------------------------
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/hardware-switches.sh
exec-once = ~/.config/hypr/scripts/monitor-hotplug-restore.sh
exec-once = ~/.config/hypr/scripts/lid-lock.sh

# ---------------------------------------------------------------------------
# Media
# ---------------------------------------------------------------------------
exec-once = playerctld daemon

# ---------------------------------------------------------------------------
# Wallpaper — herstel via skwd-wall daemon (start in 71-autostart-ui.conf)
# wallpaper-init.sh is niet nodig: skwd-wall/WallpaperApplyService.restore()
# herstelt de laatste wallpaper zodra awww-daemon + skwd-daemon draaien
# ---------------------------------------------------------------------------
# exec-once = ~/.config/hypr/scripts/wallpaper-init.sh

# ---------------------------------------------------------------------------
# GTK-instellingen doorgeven aan Wayland
# ---------------------------------------------------------------------------
exec-once = ~/.config/hypr/scripts/gtk.sh

# ---------------------------------------------------------------------------
# XDG-gebruikersmappen aanmaken
# ---------------------------------------------------------------------------
exec-once = xdg-user-dirs-update
