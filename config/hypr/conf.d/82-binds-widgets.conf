# =============================================================================
# 82-binds-widgets.conf — UI-widgets (SwayNC, Quickshell)
# =============================================================================
# Quickshell IPC-commando's worden toegevoegd zodra fase 5 klaar is.
# $mainMod is gedefinieerd in 80-binds-core.conf

# ---------------------------------------------------------------------------
# SwayNC — notificaties en control center
# ---------------------------------------------------------------------------
bind = $mainMod,       N,    exec, swaync-client -t        # Toggle control center
bind = $mainMod SHIFT, N,    exec, swaync-client -d        # Alle meldingen sluiten
bind = $mainMod ALT,   N,    exec, swaync-client --inhibit-toggle  # Niet-storen wisselen

# ---------------------------------------------------------------------------
# Quickshell — topbar popups via qs_manager.sh (file-based IPC)
# ---------------------------------------------------------------------------
bind = $mainMod, W,    exec, $scripts/qs_manager.sh toggle wallpaper   # Wallpaper selector
bind = $mainMod, M,    exec, $scripts/qs_manager.sh toggle music       # Muziek popup
bind = $mainMod, C,    exec, $scripts/qs_manager.sh toggle calendar    # Kalender popup
bind = $mainMod, O,    exec, $scripts/qs_manager.sh toggle monitors    # Monitor overzicht
bind = $mainMod, X,    exec, $scripts/qs_manager.sh toggle focustime   # FocusTime
