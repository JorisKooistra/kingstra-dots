# =============================================================================
# 20-input.conf — Invoer (toetsenbord, muis, touchpad)
# =============================================================================

input {
    kb_layout  = us
    kb_options =                 # Bijv. "grp:alt_shift_toggle" voor meerdere talen

    follow_mouse   = 1
    mouse_refocus  = true
    sensitivity    = 0           # -1.0 tot 1.0; 0 = geen versnelling
    accel_profile  = flat

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        tap-and-drag         = true
        scroll_factor        = 0.5
        clickfinger_behavior = true
        middle_button_emulation = false
    }
}

gestures {
    workspace_swipe       = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert  = true
    workspace_swipe_cancel_ratio = 0.5
}

cursor {
    no_warps          = true
    inactive_timeout  = 10       # Cursor verbergen na 10 seconden inactiviteit
    hide_on_key_press = false
}
