# =============================================================================
# 20-input.conf — Invoer (toetsenbord, muis, touchpad)
# =============================================================================

input {
    kb_layout  = us
    kb_options =                 # Bijv. "grp:alt_shift_toggle" voor meerdere talen

    follow_mouse   = 1
    mouse_refocus  = true
    sensitivity    = 0           # -1.0 tot 1.0; 0 = geen versnelling
    accel_profile  = flat

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        tap-and-drag         = true
        scroll_factor        = 0.5
        clickfinger_behavior = true
        middle_button_emulation = false
    }
}

# Touchpad swipe gestures (actuele Hyprland syntax)
# Let op: oude variabelen zoals workspace_swipe/workspace_swipe_fingers zijn verwijderd.
gestures {
    # Voelt net iets directer dan defaults zonder te "snappy" te worden.
    workspace_swipe_distance = 320
    workspace_swipe_invert = true
    workspace_swipe_cancel_ratio = 0.45
    workspace_swipe_min_speed_to_force = 25
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 12
    workspace_swipe_create_new = false
    workspace_swipe_forever = false
    workspace_swipe_use_r = false
    # Touchscreen volgt dezelfde richting als touchpad voor consistente muscle memory.
    workspace_swipe_touch = true
    workspace_swipe_touch_invert = true
}

# 3-vinger horizontale swipe voor workspace switch (nieuwe gestures-system).
gesture = 3, horizontal, workspace
# Extra swipe: 4 vingers omhoog/omlaag togglet scratch workspace.
gesture = 4, up, special, magic
gesture = 4, down, special, magic

cursor {
    no_warps          = true
    inactive_timeout  = 10       # Cursor verbergen na 10 seconden inactiviteit
    hide_on_key_press = false
}
