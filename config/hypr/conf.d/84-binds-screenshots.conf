# =============================================================================
# 84-binds-screenshots.conf — Screenshots
# =============================================================================
# Gedrag (zie plan sectie 9):
#   Print              → gebied kiezen, opslaan + kopiëren naar klembord
#   Super + Print      → gebied kiezen, alleen naar klembord (niet opslaan)
#   Shift + Print      → gebied kiezen, openen in satty voor annotatie
#   Super + Shift + P  → volledig scherm opslaan
# $scripts is gedefinieerd in 80-binds-core.conf

bind = ,             Print, exec, $scripts/screenshot.sh
bind = $mainMod,     Print, exec, $scripts/screenshot.sh --clipboard
bind = SHIFT,        Print, exec, $scripts/screenshot.sh --annotate
bind = $mainMod SHIFT, P,   exec, $scripts/screenshot.sh --full
