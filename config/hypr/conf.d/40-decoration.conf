# =============================================================================
# 40-decoration.conf — Visuele decoraties (Imperative-stijl)
# =============================================================================

decoration {
    rounding = 10

    active_opacity   = 1.0
    inactive_opacity = 0.94
    fullscreen_opacity = 1.0

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        xray              = false
        ignore_opacity    = false
        popups            = true
        popups_ignorealpha = 0.2
        brightness        = 0.9
        contrast          = 0.9
        noise             = 0.02
        vibrancy          = 0.18
        vibrancy_darkness = 0.0
    }

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = $shadow_color
        color_inactive = rgba(00000055)
        offset       = 0, 4
        scale        = 1.0
    }

    dim_inactive     = false
    dim_strength     = 0.1
    dim_special      = 0.2
    dim_around       = 0.4
}
