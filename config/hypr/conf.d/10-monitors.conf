# =============================================================================
# 10-monitors.conf — Monitor-configuratie
# =============================================================================
# Standaard: gebruik de voorkeursmodus van elke monitor.
# Overschrijf specifieke monitors in 99-custom.conf.
#
# Voorbeelden:
#   monitor = DP-1, 2560x1440@144, 0x0, 1.0
#   monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1.0
#   monitor = eDP-1, 1920x1080@60, 0x0, 1.25   # Laptop scherm (125% scaling)
# =============================================================================

monitor = , preferred, auto, 1.0

# Workspace-toewijzing bij meerdere monitors (voorbeeld)
# workspace = 1, monitor:DP-1
# workspace = 6, monitor:HDMI-A-1


# BEGIN KINGSTRA MONITOR UI
# Gegenereerd door Super+O Monitor UI. Bewerk dit blok alleen als je de UI wilt overschrijven.
monitor = eDP-1,1920x1080@60,1920x0,1
monitor = DP-1,1920x1080@60,0x0,1
# END KINGSTRA MONITOR UI
