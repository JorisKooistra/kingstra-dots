# =============================================================================
# 50-animations.conf — Animaties (vloeiend, Imperative-geïnspireerd)
# =============================================================================

animations {
    enabled = true

    # Bezier-curven
    bezier = easeOut,    0.05, 0.9,  0.1,  1.05
    bezier = easeIn,     0.5,  0,    1,    0.5
    bezier = easeInOut,  0.42, 0,    0.58, 1.0
    bezier = overshot,   0.05, 0.9,  0.1,  1.1
    bezier = linear,     0,    0,    1,    1
    bezier = snap,       0.19, 1,    0.22, 1

    # Windows
    animation = windows,     1, 4,  overshot
    animation = windowsIn,   1, 4,  overshot, popin 80%
    animation = windowsOut,  1, 3,  easeIn,   popin 80%
    animation = windowsMove, 1, 4,  snap

    # Border
    animation = border,      1, 10, default
    animation = borderangle, 1, 60, linear,   loop

    # Fade
    animation = fade,        1, 5,  default
    animation = fadeIn,      1, 5,  default
    animation = fadeOut,     1, 5,  default
    animation = fadeSwitch,  1, 5,  default
    animation = fadeShadow,  1, 5,  default
    animation = fadeDim,     1, 5,  default
    animation = fadeLayers,  1, 5,  default

    # Workspaces
    animation = workspaces,        1, 5, snap,  slide
    animation = specialWorkspace,  1, 5, snap,  slidevert
    animation = layers,            1, 4, overshot, slide
}
