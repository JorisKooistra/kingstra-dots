# =============================================================================
# 81-binds-apps.conf — Applicaties en dagelijkse tools
# =============================================================================
# $mainMod en $scripts zijn gedefinieerd in 80-binds-core.conf

# ---------------------------------------------------------------------------
# Terminal en launcher
# ---------------------------------------------------------------------------
bind = $mainMod,       Return,      exec, kitty
bind = $mainMod CTRL,  Return,      exec, walker               # Hoofdlauncher

# ---------------------------------------------------------------------------
# Browser en bestanden
# ---------------------------------------------------------------------------
bind = $mainMod,       B,    exec, xdg-open https://
bind = $mainMod,       E,    exec, nautilus

# ---------------------------------------------------------------------------
# Klembord
# ---------------------------------------------------------------------------
bind = $mainMod,       V,    exec, cliphist list | walker --stdin --dmenu | cliphist decode | wl-copy

# ---------------------------------------------------------------------------
# Systeemtools
# ---------------------------------------------------------------------------
bind = $mainMod SHIFT, Return, exec, kitty --title="btop" btop
bind = $mainMod SHIFT, C,      exec, kitty --title="cava" cava

# ---------------------------------------------------------------------------
# Hyprland utilities
# ---------------------------------------------------------------------------
bind = $mainMod CTRL, B, exec, hyprctl reload && notify-send "Hyprland" "Config herladen"
