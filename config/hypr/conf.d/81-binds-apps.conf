# =============================================================================
# 81-binds-apps.conf — Applicaties en dagelijkse tools
# =============================================================================
# $mainMod en $scripts zijn gedefinieerd in 80-binds-core.conf

# ---------------------------------------------------------------------------
# Terminal en launcher
# ---------------------------------------------------------------------------
bind = $mainMod,       Return,      exec, kitty                # Terminal openen
bind = $mainMod CTRL,  Return,      exec, walker               # Hoofdlauncher

# ---------------------------------------------------------------------------
# Browser en bestanden
# ---------------------------------------------------------------------------
bind = $mainMod,       B,    exec, xdg-open https://                       # Browser openen
bind = $mainMod,       E,          exec, nautilus                           # Bestandsbeheer
bind = $mainMod SHIFT, E,          exec, kitty --title="yazi" yazi          # Terminal bestanden (Yazi)

# ---------------------------------------------------------------------------
# Klembord
# ---------------------------------------------------------------------------
bind = $mainMod,       V,    exec, bash $scripts/cliphist.sh   # Klembordgeschiedenis

# ---------------------------------------------------------------------------
# Systeemtools
# ---------------------------------------------------------------------------
bind = $mainMod SHIFT, Return, exec, kitty --title="btop" btop   # Systeemmonitor
bind = $mainMod SHIFT, C,      exec, kitty --title="cava" cava   # Audio visualizer

# ---------------------------------------------------------------------------
# Netwerk en systeem
# ---------------------------------------------------------------------------
bind = $mainMod ALT,   N,    exec, kitty --title="Network" nmtui   # Netwerkbeheer
bind = $mainMod ALT,   B,    exec, blueman-manager                 # Bluetooth beheer

# ---------------------------------------------------------------------------
# Wallpaper
# ---------------------------------------------------------------------------
bind = $mainMod SHIFT, W,    exec, kingstra-wallpaper random   # Willekeurige wallpaper
bind = $mainMod CTRL,  W,    exec, kingstra-skwd-wallpaper-sync   # Wallpaper kiezen (skwd UI + centrale Kingstra apply)

# ---------------------------------------------------------------------------
# Hyprland utilities
# ---------------------------------------------------------------------------
bind = $mainMod CTRL,  B,    exec, hyprctl reload && notify-send "Hyprland" "Config herladen"   # Config herladen
