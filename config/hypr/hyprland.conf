# =============================================================================
# hyprland.conf — kingstra-dots
# =============================================================================
# Modulaire configuratie via conf.d.
# Pas NIETS aan in dit bestand zelf — gebruik custom.conf voor overrides.
# =============================================================================

# ---------------------------------------------------------------------------
# Matugen-kleuren (wordt overschreven door fase 8)
# ---------------------------------------------------------------------------
source = ~/.config/hypr/colors.conf

# ---------------------------------------------------------------------------
# Core-configuratie
# ---------------------------------------------------------------------------
source = ~/.config/hypr/conf.d/10-monitors.conf
source = ~/.config/hypr/conf.d/20-input.conf
source = ~/.config/hypr/conf.d/30-general.conf
source = ~/.config/hypr/conf.d/40-decoration.conf
source = ~/.config/hypr/conf.d/50-animations.conf
source = ~/.config/hypr/conf.d/60-rules.conf

# ---------------------------------------------------------------------------
# Autostart (fase 3 — minimale kern; fase 5+ voegt UI-laag toe)
# ---------------------------------------------------------------------------
source = ~/.config/hypr/conf.d/70-autostart.conf

# ---------------------------------------------------------------------------
# Keybindings (fase 4 — stubs aanwezig, worden gevuld)
# ---------------------------------------------------------------------------
source = ~/.config/hypr/conf.d/80-binds-core.conf
source = ~/.config/hypr/conf.d/81-binds-apps.conf
source = ~/.config/hypr/conf.d/82-binds-widgets.conf
source = ~/.config/hypr/conf.d/83-binds-media.conf
source = ~/.config/hypr/conf.d/84-binds-screenshots.conf

# ---------------------------------------------------------------------------
# Persoonlijke overrides (nooit overschreven door de installer)
# ---------------------------------------------------------------------------
source = ~/.config/hypr/conf.d/99-custom.conf
