# Matugen template: yazi file manager theme from wallpaper

[mode]
normal_main = { fg = "#10353c", bg = "#a9cdd6", bold = true }
normal_alt  = { fg = "#a9cdd6", bg = "reset" }
select_main = { fg = "#263236", bg = "#bbc9cd", bold = true }
select_alt  = { fg = "#bbc9cd", bg = "reset" }
unset_main  = { fg = "#452a12", bg = "#eabe9c", bold = true }
unset_alt   = { fg = "#eabe9c", bg = "reset" }

[status]
overall = { fg = "reset", bg = "reset" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "#a9cdd6", bold = true }
perm_read  = { fg = "#eabe9c" }
perm_write = { fg = "#bbc9cd" }
perm_exec  = { fg = "#ffb4ab" }
perm_sep   = { fg = "#8b9294" }

progress_label  = { fg = "#e3e2e2", bold = true }
progress_normal = { fg = "#a9cdd6", bg = "reset" }
progress_error  = { fg = "#ffb4ab", bg = "reset" }

[mgr]
cwd = { fg = "#a9cdd6", bold = true }

find_keyword  = { fg = "#eabe9c", bold = true, italic = true, underline = true }
find_position = { fg = "#bbc9cd", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "#a9cdd6", bg = "#a9cdd6" }
marker_cut      = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_marked   = { fg = "#bbc9cd", bg = "#bbc9cd" }
marker_selected = { fg = "#eabe9c", bg = "#eabe9c" }

count_copied   = { fg = "#10353c", bg = "#a9cdd6" }
count_cut      = { fg = "#690005", bg = "#ffb4ab" }
count_selected = { fg = "#452a12", bg = "#eabe9c" }

border_symbol = "│"
border_style  = { fg = "#8b9294" }

hovered = { bg = "#38393a" }

[indicator]
parent  = { fg = "#bbc9cd", bold = true }
current = { fg = "#a9cdd6", bold = true }
preview = { fg = "#8b9294", bold = true }
padding = { open = "", close = " " }

[tabs]
active   = { fg = "#10353c", bg = "#a9cdd6" }
inactive = { fg = "#e3e2e2", bg = "#1e2020" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[input]
border   = { fg = "#a9cdd6" }
title    = { fg = "#a9cdd6" }
value    = { fg = "#e3e2e2" }
selected = { reversed = true }

[pick]
border   = { fg = "#a9cdd6" }
active   = { fg = "#10353c", bg = "#a9cdd6" }
inactive = { fg = "#e3e2e2" }

[confirm]
border = { fg = "#a9cdd6" }
title  = { fg = "#a9cdd6" }
body   = { fg = "#e3e2e2" }
list   = { fg = "#e3e2e2" }
btn_yes = { fg = "#10353c", bg = "#a9cdd6" }
btn_no  = { fg = "#690005", bg = "#ffb4ab" }
btn_labels = [ " Yes ", " No " ]

[notify]
title_info  = { fg = "#a9cdd6" }
title_warn  = { fg = "#eabe9c" }
title_error = { fg = "#ffb4ab" }

[help]
on     = { fg = "#a9cdd6" }
run    = { fg = "#bbc9cd" }
desc   = { fg = "#e3e2e2" }
hovered = { reversed = true }
footer  = { fg = "#8b9294" }

[which]
cols = 3
mask = { bg = "#1e2020" }
cand = { fg = "#a9cdd6" }
rest = { fg = "#8b9294" }
desc = { fg = "#e3e2e2" }
separator = " → "
separator_style = { fg = "#8b9294" }

[tasks]
border  = { fg = "#a9cdd6" }
title   = { fg = "#a9cdd6" }
hovered = { reversed = true }

[filetype]
rules = [
    { mime = "image/*", fg = "#bbc9cd" },
    { mime = "{audio,video}/*", fg = "#bbc9cd" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ffb4ab" },
    { mime = "application/{pdf,doc,rtf}", fg = "#a9cdd6" },
    { url = "*/", fg = "#bbc9cd", bold = true },
    { url = "*", fg = "#eabe9c" },
]

[icon]
globs = []
dirs  = []
files = []
exts  = []
conds = []
