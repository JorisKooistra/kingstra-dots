# Automatisch gegenereerd door matugen. Pas dit bestand NIET aan.
# Gegenereerd vanuit config/matugen/templates/yazi-theme.toml

[manager]
cwd            = { fg = "{{colors.primary.default.hex}}" }
hovered        = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
preview_hovered = { underline = true }

find_keyword  = { fg = "{{colors.tertiary.default.hex}}", italic = true }
find_position = { fg = "{{colors.secondary.default.hex}}", italic = true }

marker_copied   = { fg = "{{colors.tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
marker_selected = { fg = "{{colors.primary.default.hex}}",   bg = "{{colors.primary.default.hex}}" }

tab_active   = { fg = "{{colors.on_primary.default.hex}}",         bg = "{{colors.primary.default.hex}}" }
tab_inactive = { fg = "{{colors.on_surface_variant.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "{{colors.outline.default.hex}}", bg = "{{colors.surface.default.hex}}" }

mode_normal = { fg = "{{colors.on_primary.default.hex}}",    bg = "{{colors.primary.default.hex}}",   bold = true }
mode_select = { fg = "{{colors.on_tertiary.default.hex}}",   bg = "{{colors.tertiary.default.hex}}",  bold = true }
mode_unset  = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }

progress_label  = { fg = "{{colors.on_background.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}",    bg = "{{colors.surface.default.hex}}" }
progress_error  = { fg = "{{colors.error.default.hex}}",      bg = "{{colors.surface.default.hex}}" }

perm_type  = { fg = "{{colors.primary.default.hex}}" }
perm_read  = { fg = "{{colors.tertiary.default.hex}}" }
perm_write = { fg = "{{colors.error.default.hex}}" }
perm_exec  = { fg = "{{colors.secondary.default.hex}}" }
perm_sep   = { fg = "{{colors.outline.default.hex}}" }

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = { fg = "{{colors.on_background.default.hex}}" }
value    = { fg = "{{colors.on_surface.default.hex}}" }
selected = { reversed = true }

[select]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}" }
inactive = { fg = "{{colors.on_surface_variant.default.hex}}" }

[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = { fg = "{{colors.on_background.default.hex}}" }
hovered = { underline = true }

[which]
mask    = { bg = "{{colors.surface.default.hex}}" }
cwd     = { fg = "{{colors.primary.default.hex}}" }
rest    = { fg = "{{colors.on_surface_variant.default.hex}}" }
hovered = { reversed = true }
footer  = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

[help]
on      = { fg = "{{colors.primary.default.hex}}" }
exec    = { fg = "{{colors.tertiary.default.hex}}" }
desc    = { fg = "{{colors.on_surface_variant.default.hex}}" }
hovered = { reversed = true }
footer  = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

[completion]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { reversed = true }
inactive = {}
