# =============================================================================
# hyprlock.conf — Gegenereerd door matugen. Pas dit bestand NIET aan.
# Template: config/matugen/templates/hyprlock.conf
# =============================================================================

# ---------------------------------------------------------------------------
# Achtergrond — screenshot van huidig scherm + heavy blur
# ---------------------------------------------------------------------------
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.65
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ---------------------------------------------------------------------------
# Klok — groot centraal
# ---------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba({{colors.on_background.default.hex_stripped}}ff)
    font_size = 96
    font_family = JetBrains Mono Bold
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba({{colors.shadow.default.hex_stripped}}88)
}

# ---------------------------------------------------------------------------
# Datum
# ---------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgba({{colors.on_surface_variant.default.hex_stripped}}dd)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 10
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba({{colors.shadow.default.hex_stripped}}66)
}

# ---------------------------------------------------------------------------
# Gebruiker@host — subtiel onder de datum
# ---------------------------------------------------------------------------
label {
    monitor =
    text = $USER@$HOST
    color = rgba({{colors.outline.default.hex_stripped}}aa)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, -60
    halign = center
    valign = center
}

# ---------------------------------------------------------------------------
# Wachtwoord-inputveld
# ---------------------------------------------------------------------------
input-field {
    monitor =
    size = 320, 54
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1

    outer_color = rgba({{colors.primary.default.hex_stripped}}ff)
    inner_color = rgba({{colors.surface.default.hex_stripped}}cc)
    font_color = rgba({{colors.on_surface.default.hex_stripped}}ff)

    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i><span foreground="##{{colors.on_surface_variant.default.hex_stripped}}">Wachtwoord...</span></i>
    hide_input = false
    rounding = 18

    check_color = rgba({{colors.tertiary.default.hex_stripped}}ff)
    fail_color = rgba({{colors.error.default.hex_stripped}}ff)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition = 300

    capslock_color = rgba({{colors.on_tertiary_container.default.hex_stripped}}ff)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -160
    halign = center
    valign = center
}
