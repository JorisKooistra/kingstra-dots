# =============================================================================
# hypr-colors.conf — Matugen template voor Hyprland kleuren
# Gegenereerd door: matugen image <wallpaper>
# =============================================================================

$primary           = rgba({{colors.primary.default.hex_stripped}}ee)
$on_primary        = rgba({{colors.on_primary.default.hex_stripped}}ee)
$primary_container = rgba({{colors.primary_container.default.hex_stripped}}ee)
$secondary         = rgba({{colors.secondary.default.hex_stripped}}ee)
$on_secondary      = rgba({{colors.on_secondary.default.hex_stripped}}ee)
$surface           = rgba({{colors.surface.default.hex_stripped}}ee)
$on_surface        = rgba({{colors.on_surface.default.hex_stripped}}ee)
$background        = rgba({{colors.background.default.hex_stripped}}ff)
$error             = rgba({{colors.error.default.hex_stripped}}ee)

$border_active   = $primary $secondary 45deg
$border_inactive = rgba({{colors.outline.default.hex_stripped}}44)
$shadow_color    = rgba({{colors.shadow.default.hex_stripped}}cc)
