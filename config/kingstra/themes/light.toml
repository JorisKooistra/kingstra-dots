[meta]
name = "Light"
description = "Nordisch wit — klinisch, schoon, veel lucht"
icon = "󰃠"
preview_image = "light.jpg"

[matugen]
scheme_type = "scheme-neutral"
color_index = 0
contrast = 0.6
mode = "light"

[appearance]
border_radius = 16
border_width = 1
gaps_in = 8
gaps_out = 16
bar_opacity = 0.96
popup_opacity = 0.98
blur_size = 18
blur_passes = 5
animation_speed = 0.9

[fonts]
ui_font = "Fira Sans"
ui_font_size = 13
mono_font = "Fira Code"
mono_font_size = 12

[icons]
icon_theme = "Papirus-Light"

[quickshell]
bar_height = 38
bar_position = "top"
