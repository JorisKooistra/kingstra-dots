[meta]
name = "Ocean"
description = "Diepe zee — koel, stil, bioluminescent donker"
icon = "󰇙"
preview_image = "ocean.jpg"

[matugen]
scheme_type = "scheme-fidelity"
color_index = 2
contrast = 0.1
mode = "dark"

[appearance]
border_radius = 20
border_width = 1
gaps_in = 10
gaps_out = 20
bar_opacity = 0.54
popup_opacity = 0.68
blur_size = 28
blur_passes = 5
animation_speed = 0.85

[fonts]
ui_font = "Noto Sans"
ui_font_size = 13
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "Noto Sans"
font_weight = "light"
letter_spacing = 0.5

[icons]
icon_theme = "Papirus-Dark"

[quickshell]
bar_height = 38
bar_position = "bottom"

[color_transform]
hue_shift = -15
saturation_adjust = 0.12
lightness_adjust = -0.06
thematic_mix = 0.22

[material]
texture = "flow"
overlay_opacity = 0.04
glow_intensity = 0.14

[terminal]
bg_opacity = 0.76
blur = true
padding = 14
cursor_style = "beam"

[bar]
shape = "capsule"
template = "horizontal"
width_mode = "floating"
floating = true
attach_to_screen_edge = false
top_edge_style = "soft"
bottom_edge_style = "soft"
clock_style = "hybrid"

[widgets]
shape = "capsule-soft"
surface = "liquid-glass"

[style_profile]
family = "ocean"
density = "airy"
surface_mode = "mist"
motion = "smooth"
panel_shadow = 0.26
outline_strength = 0.16
glass_strength = 0.20
widget_radius = 24
panel_padding = 18

[effects]
particles = "rain"
particle_count = 16
particle_speed = 0.34
ambient_effect = "ocean-wave"
effect_intensity = 1.15
effect_cycle_ms = 4200
hover_reactivity = 0.40

[bar_dynamics]
drawer_style = "context-card"
module_density = "balanced"
workspace_preview = "hybrid"
rail_accent = "edge-line"

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
