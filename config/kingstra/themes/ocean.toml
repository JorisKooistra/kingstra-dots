[meta]
name = "Ocean"
description = "Diepe zee — koel, rustig, vloeiend"
icon = "󰇙"
preview_image = "ocean.jpg"

[matugen]
scheme_type = "scheme-fidelity"
color_index = 2
contrast = 0.0
mode = "light"

[appearance]
border_radius = 18
border_width = 1
gaps_in = 8
gaps_out = 16
bar_opacity = 0.72
popup_opacity = 0.80
blur_size = 24
blur_passes = 4
animation_speed = 0.9

[fonts]
ui_font = "Noto Sans"
ui_font_size = 13
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "Noto Sans"
font_weight = "light"
letter_spacing = 0.5

[icons]
icon_theme = "Papirus-Dark"

[quickshell]
bar_height = 38
bar_position = "top"

[color_transform]
hue_shift = -10
saturation_adjust = 0.10
lightness_adjust = 0.05
thematic_mix = 0.20

[material]
texture = "flow"
overlay_opacity = 0.03
glow_intensity = 0.05

[terminal]
bg_opacity = 0.82
blur = true
padding = 14
cursor_style = "beam"

[bar]
shape = "capsule"
width_mode = "floating"
floating = true
attach_to_screen_edge = false
top_edge_style = "soft"
bottom_edge_style = "soft"
clock_style = "hybrid"

[widgets]
shape = "capsule-soft"
surface = "liquid-glass"

[effects]
particles = "none"
particle_count = 0
particle_speed = 0.0

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
