[meta]
name = "Cyber"
description = "Neon — scherp, hoog contrast, elektrisch"
icon = "󰙷"
preview_image = "cyber.jpg"

[matugen]
scheme_type = "scheme-fidelity"
color_index = 0
contrast = 0.2
mode = "dark"

[appearance]
border_radius = 4
border_width = 2
gaps_in = 4
gaps_out = 8
bar_opacity = 0.92
popup_opacity = 0.95
blur_size = 4
blur_passes = 2
animation_speed = 1.3

[fonts]
ui_font = "Share Tech Mono"
ui_font_size = 12
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "Share Tech Mono"
font_weight = "regular"
letter_spacing = 1.2

[icons]
icon_theme = "Papirus-Dark"

[quickshell]
bar_height = 34
bar_position = "top"

[color_transform]
hue_shift = 0
saturation_adjust = 0.25
lightness_adjust = 0.08
thematic_mix = 0.05

[material]
texture = "gridline"
overlay_opacity = 0.05
glow_intensity = 0.30

[terminal]
bg_opacity = 0.92
blur = false
padding = 8
cursor_style = "block"

[bar]
shape = "beveled"
width_mode = "full"
floating = false
attach_to_screen_edge = true
top_edge_style = "beveled"
bottom_edge_style = "beveled"
clock_style = "digital"

[widgets]
shape = "segmented"
surface = "hard-tech"

[ornaments]
enabled = false
top_left = ""
top_right = ""
opacity = 0.0

[effects]
particles = "none"
particle_count = 0
particle_speed = 0.0

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
