[meta]
name = "Botanical"
description = "Temperate rainforest — mos, hout, gefilterd licht"
icon = "󰌪"
preview_image = "botanical.jpg"

[matugen]
scheme_type = "scheme-vibrant"
color_index = 2
contrast = 0.2
mode = "dark"

[appearance]
border_radius = 24
border_width = 1
gaps_in = 10
gaps_out = 20
bar_opacity = 0.78
popup_opacity = 0.84
blur_size = 20
blur_passes = 5
animation_speed = 0.85

[fonts]
ui_font = "Fira Sans"
ui_font_size = 13
mono_font = "Fira Code"
mono_font_size = 12

[icons]
icon_theme = "Papirus"

[quickshell]
bar_height = 40
bar_position = "top"
