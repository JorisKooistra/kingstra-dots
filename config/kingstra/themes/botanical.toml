[meta]
name = "Botanical"
description = "Temperate rainforest — mos, hout, gefilterd licht"
icon = "󰌪"
preview_image = "botanical.jpg"

[matugen]
scheme_type = "scheme-content"
color_index = 1
contrast = 0.1
mode = "light"

[appearance]
border_radius = 24
border_width = 1
gaps_in = 10
gaps_out = 20
bar_opacity = 0.78
popup_opacity = 0.84
blur_size = 22
blur_passes = 3
animation_speed = 0.85

[fonts]
ui_font = "Fira Sans"
ui_font_size = 13
mono_font = "Fira Code"
mono_font_size = 12
display_font = "Fira Sans"
font_weight = "light"
letter_spacing = 0.3

[icons]
icon_theme = "Papirus"

[quickshell]
bar_height = 40
bar_position = "top"

[color_transform]
hue_shift = 5
saturation_adjust = -0.05
lightness_adjust = 0.02
thematic_mix = 0.15

[material]
texture = "grain"
overlay_opacity = 0.04
glow_intensity = 0.02

[terminal]
bg_opacity = 0.85
blur = true
padding = 12
cursor_style = "beam"

[bar]
shape = "organic-grown"
width_mode = "full"
floating = false
attach_to_screen_edge = true
top_edge_style = "flush"
bottom_edge_style = "ornate-rounded"
clock_style = "analog"

[widgets]
shape = "soft-organic"
surface = "wood-matte"

[ornaments]
enabled = true
top_left = "assets/themes/botanical/ornament-top-left.svg"
top_right = "assets/themes/botanical/ornament-top-right.svg"
opacity = 0.42

[effects]
particles = "fireflies"
particle_count = 4
particle_speed = 0.18

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
