[meta]
name = "Botanical"
description = "Donker woud — mos, hout, gefilterd maanlicht"
icon = "󰌪"
preview_image = "botanical.jpg"

[matugen]
scheme_type = "scheme-content"
color_index = 1
contrast = 0.05
mode = "dark"

[appearance]
border_radius = 32
border_width = 1
gaps_in = 12
gaps_out = 24
bar_opacity = 0.72
popup_opacity = 0.8
blur_size = 26
blur_passes = 5
animation_speed = 0.75

[fonts]
ui_font = "Fira Sans"
ui_font_size = 13
mono_font = "Fira Code"
mono_font_size = 12
display_font = "Fira Sans"
font_weight = "light"
letter_spacing = 0.3

[icons]
icon_theme = "Papirus"

[quickshell]
bar_height = 44
bar_position = "top"

[color_transform]
hue_shift = 8
saturation_adjust = -0.08
lightness_adjust = -0.05
thematic_mix = 0.2

[material]
texture = "grain"
overlay_opacity = 0.06
glow_intensity = 0.04

[terminal]
bg_opacity = 0.8
blur = true
padding = 16
cursor_style = "beam"

[bar]
shape = "organic-grown"
template = "horizontal"
width_mode = "full"
floating = false
attach_to_screen_edge = true
top_edge_style = "flush"
bottom_edge_style = "ornate-rounded"
clock_style = "analog"
topbar_loose_blocks = true

[widgets]
shape = "soft-organic"
surface = "wood-matte"

[effects]
particles = "fireflies"
particle_count = 8
particle_speed = 0.18

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0
