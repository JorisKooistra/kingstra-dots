[meta]
name = "Botanical"
description = "Natuurlijke groene tinten, rustig en organisch"
icon = "󰌪"
preview_image = "botanical.jpg"

[matugen]
scheme_type = "scheme-vibrant"
color_index = 2
contrast = 0.3

[appearance]
border_radius = 20
border_width = 1
gaps_in = 8
gaps_out = 16
bar_opacity = 0.88
popup_opacity = 0.93
blur_size = 14
blur_passes = 4
animation_speed = 0.9

[fonts]
ui_font = "Inter"
ui_font_size = 13
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12

[icons]
icon_theme = "Papirus-Dark"

[quickshell]
bar_height = 38
bar_position = "top"
