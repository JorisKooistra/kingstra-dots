[meta]
name = "Space"
description = "Kosmisch — diep, donker, zwevend tussen de sterren"
icon = "󰁛"
preview_image = "space.jpg"

[matugen]
scheme_type = "scheme-expressive"
color_index = 0
contrast = 0.4
mode = "dark"

[appearance]
border_radius = 14
border_width = 1
gaps_in = 16
gaps_out = 32
bar_opacity = 0.55
popup_opacity = 0.65
blur_size = 36
blur_passes = 6
animation_speed = 1.0

[fonts]
ui_font = "Space Grotesk"
ui_font_size = 13
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "Space Grotesk"
font_weight = "medium"
letter_spacing = 1.0

[icons]
icon_theme = "Papirus-Dark"

[quickshell]
bar_height = 38
bar_position = "top"

[color_transform]
hue_shift = 20
saturation_adjust = 0.10
lightness_adjust = -0.08
thematic_mix = 0.30

[material]
texture = "star-specks"
overlay_opacity = 0.06
glow_intensity = 0.20

[terminal]
bg_opacity = 0.72
blur = true
padding = 14
cursor_style = "beam"

[bar]
shape = "segmented-capsule"
template = "horizontal"
width_mode = "floating"
floating = true
attach_to_screen_edge = false
top_edge_style = "soft"
bottom_edge_style = "soft"
clock_style = "hybrid"

[widgets]
shape = "dark-capsule"
surface = "deep-glass"

[style_profile]
family = "space"
density = "airy"
surface_mode = "cinematic-glass"
motion = "float"
panel_shadow = 0.32
outline_strength = 0.18
glass_strength = 0.14
widget_radius = 16
panel_padding = 16

[effects]
particles = "space-specks-layered"
particle_count = 28
particle_speed = 0.06
ambient_effect = "space-nebula"
effect_intensity = 0.95
effect_cycle_ms = 11000
hover_reactivity = 0.18

[bar_dynamics]
drawer_style = "context-card"
module_density = "rich"
workspace_preview = "app-icons"
rail_accent = "segmented"

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
