[meta]
name = "Animated"
description = "Levendig — kleurrijk, snel, vol energie"
icon = "󰬀"
preview_image = "animated.jpg"

[matugen]
scheme_type = "scheme-fruit-salad"
color_index = 0
contrast = 0.15
mode = "dark"

[appearance]
border_radius = 18
border_width = 1
gaps_in = 10
gaps_out = 20
bar_opacity = 0.68
popup_opacity = 0.86
blur_size = 18
blur_passes = 3
animation_speed = 0.50

[fonts]
ui_font = "Nunito"
ui_font_size = 13
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "Nunito"
font_weight = "regular"
letter_spacing = 0.2

[icons]
icon_theme = "Papirus"

[quickshell]
bar_height = 40
bar_position = "left"

[color_transform]
hue_shift = 12
saturation_adjust = 0.22
lightness_adjust = 0.04
thematic_mix = 0.18

[material]
texture = "motion"
overlay_opacity = 0.05
glow_intensity = 0.30

[terminal]
bg_opacity = 0.82
blur = true
padding = 14
cursor_style = "beam"

[bar]
shape = "kinetic-dock"
template = "compact-sidebar"
width_mode = "floating"
floating = true
attach_to_screen_edge = false
top_edge_style = "soft"
bottom_edge_style = "soft"
clock_style = "digital"

[widgets]
shape = "rounded"
surface = "vivid-glass"

[style_profile]
family = "animated"
density = "comfortable"
surface_mode = "vivid-glass"
motion = "playful"
panel_shadow = 0.30
outline_strength = 0.22
glass_strength = 0.16
widget_radius = 18
panel_padding = 15

[effects]
particles = "sparkles"
particle_count = 14
particle_speed = 0.9
ambient_effect = "animated-rainbow"
effect_intensity = 1.25
effect_cycle_ms = 3200
hover_reactivity = 1.0

[bar_dynamics]
drawer_style = "context-card"
module_density = "balanced"
workspace_preview = "hybrid"
rail_accent = "pulse-line"

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
