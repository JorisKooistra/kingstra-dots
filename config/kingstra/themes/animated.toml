[meta]
name = "Animated"
description = "Levendig — kleurrijk, dynamisch, expressief"
icon = "󰬀"
preview_image = "animated.jpg"

[matugen]
scheme_type = "scheme-fruit-salad"
color_index = 0
contrast = 0.1
mode = "dark"

[appearance]
border_radius = 20
border_width = 1
gaps_in = 8
gaps_out = 16
bar_opacity = 0.80
popup_opacity = 0.88
blur_size = 16
blur_passes = 3
animation_speed = 0.6

[fonts]
ui_font = "Nunito"
ui_font_size = 13
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "Nunito"
font_weight = "bold"
letter_spacing = 0.5

[icons]
icon_theme = "Papirus"

[quickshell]
bar_height = 40
bar_position = "top"

[color_transform]
hue_shift = 10
saturation_adjust = 0.20
lightness_adjust = 0.03
thematic_mix = 0.18

[material]
texture = "motion"
overlay_opacity = 0.04
glow_intensity = 0.10

[terminal]
bg_opacity = 0.85
blur = true
padding = 14
cursor_style = "beam"

[bar]
shape = "rounded"
width_mode = "floating"
floating = true
attach_to_screen_edge = false
top_edge_style = "soft"
bottom_edge_style = "soft"
clock_style = "digital"

[widgets]
shape = "rounded"
surface = "vivid-glass"

[effects]
particles = "none"
particle_count = 0
particle_speed = 0.0

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
