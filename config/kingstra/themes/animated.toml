[meta]
name = "Animated"
description = "Levendig — kleurrijk, snel, vol energie"
icon = "󰬀"
preview_image = "animated.jpg"

[matugen]
scheme_type = "scheme-fruit-salad"
color_index = 0
contrast = 0.15
mode = "dark"

[appearance]
border_radius = 22
border_width = 1
gaps_in = 10
gaps_out = 20
bar_opacity = 0.75
popup_opacity = 0.86
blur_size = 18
blur_passes = 3
animation_speed = 0.50

[fonts]
ui_font = "Nunito"
ui_font_size = 13
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "Nunito"
font_weight = "bold"
letter_spacing = 0.4

[icons]
icon_theme = "Papirus"

[quickshell]
bar_height = 42
bar_position = "top"

[color_transform]
hue_shift = 12
saturation_adjust = 0.22
lightness_adjust = 0.04
thematic_mix = 0.18

[material]
texture = "motion"
overlay_opacity = 0.05
glow_intensity = 0.18

[terminal]
bg_opacity = 0.82
blur = true
padding = 14
cursor_style = "beam"

[bar]
shape = "rounded"
width_mode = "floating"
floating = true
attach_to_screen_edge = false
top_edge_style = "soft"
bottom_edge_style = "soft"
clock_style = "digital"

[widgets]
shape = "rounded"
surface = "vivid-glass"

[effects]
particles = "none"
particle_count = 0
particle_speed = 0.0

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
