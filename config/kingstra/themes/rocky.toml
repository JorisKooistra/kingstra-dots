[meta]
name = "Rocky"
description = "Graniet — hoekig, solide, rauw en onverbiddelijk"
icon = "󰋘"
preview_image = "rocky.jpg"

[matugen]
scheme_type = "scheme-monochrome"
color_index = 0
contrast = 0.2
mode = "dark"

[appearance]
border_radius = 2
border_width = 4
gaps_in = 2
gaps_out = 4
bar_opacity = 0.99
popup_opacity = 0.99
blur_size = 0
blur_passes = 0
animation_speed = 1.6

[fonts]
ui_font = "JetBrains Mono"
ui_font_size = 12
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "JetBrains Mono"
font_weight = "regular"
letter_spacing = 0

[icons]
icon_theme = "Breeze"

[quickshell]
bar_height = 44
bar_position = "bottom"

[color_transform]
hue_shift = 0
saturation_adjust = -0.2
lightness_adjust = -0.05
thematic_mix = 0.08

[material]
texture = "noise"
overlay_opacity = 0.04
glow_intensity = 0

[terminal]
bg_opacity = 0.98
blur = false
padding = 8
cursor_style = "block"

[bar]
shape = "block"
template = "horizontal"
width_mode = "full"
floating = false
attach_to_screen_edge = true
top_edge_style = "flush"
bottom_edge_style = "hard"
clock_style = "digital"
topbar_loose_blocks = false

[widgets]
shape = "hard-rect"
surface = "stone-matte"

[style_profile]
family = "rocky"
density = "compact"
surface_mode = "solid"
motion = "firm"
panel_shadow = 0.12
outline_strength = 0.34
glass_strength = 0.02
widget_radius = 4
panel_padding = 9

[effects]
particles = "none"
particle_count = 0
particle_speed = 0
ambient_effect = "rocky-bevel"
effect_intensity = 0.85
effect_cycle_ms = 0
hover_reactivity = 0.15

[bar_dynamics]
drawer_style = "none"
module_density = "minimal"
workspace_preview = "numbers"
rail_accent = "segmented"

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0
