[meta]
name = "Rocky"
description = "Graniet — hoekig, solide, geen nonsens"
icon = "󰋘"
preview_image = "rocky.jpg"

[matugen]
scheme_type = "scheme-monochrome"
color_index = 0
contrast = 0.0
mode = "dark"

[appearance]
border_radius = 2
border_width = 4
gaps_in = 2
gaps_out = 4
bar_opacity = 0.99
popup_opacity = 0.99
blur_size = 2
blur_passes = 1
animation_speed = 1.6

[fonts]
ui_font = "JetBrains Mono"
ui_font_size = 12
mono_font = "JetBrainsMono Nerd Font"
mono_font_size = 12
display_font = "JetBrains Mono"
font_weight = "regular"
letter_spacing = 0.0

[icons]
icon_theme = "Breeze"

[quickshell]
bar_height = 44
bar_position = "top"

[color_transform]
hue_shift = 0
saturation_adjust = -0.15
lightness_adjust = -0.03
thematic_mix = 0.10

[material]
texture = "noise"
overlay_opacity = 0.03
glow_intensity = 0.0

[terminal]
bg_opacity = 0.95
blur = false
padding = 8
cursor_style = "block"

[bar]
shape = "block"
width_mode = "full"
floating = false
attach_to_screen_edge = true
top_edge_style = "flush"
bottom_edge_style = "hard"
clock_style = "digital"

[widgets]
shape = "hard-rect"
surface = "stone-matte"

[effects]
particles = "none"
particle_count = 0
particle_speed = 0.0

[terminal_visual]
overlay_asset = ""
overlay_opacity = 0.0
