# =============================================================================
# /etc/sddm.conf.d/kingstra.conf — SDDM configuratie
# Wordt geplaatst door fase 10 installer (vereist sudo).
# =============================================================================

[General]
# Numlock standaard aan
Numlock=on

[Theme]
# Catppuccin Mocha theme (sddm-catppuccin-mocha-git via AUR)
Current=catppuccin-mocha

[Wayland]
# Hyprland-sessie als standaard
SessionDir=/usr/share/wayland-sessions
CompositorCommand=Hyprland

[Users]
# Automatisch inloggen — leeg laten voor uitgeschakeld
DefaultPath=/usr/local/sbin:/usr/local/bin:/usr/bin
HideShells=/sbin/nologin,/bin/false
MinimumUid=1000
MaximumUid=60513
RememberLastUser=true
RememberLastSession=true
