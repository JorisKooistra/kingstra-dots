# =============================================================================
# hyprpaper.conf — Hyprpaper configuratie
# =============================================================================
# Wallpapers worden runtime ingesteld via kingstra-wallpaper (hyprctl IPC).
# Dit bestand configureert alleen globale gedragsinstellingen.

# Geen splash-scherm bij opstarten
splash = false

# IPC inschakelen zodat hyprctl hyprpaper werkt
ipc = true
