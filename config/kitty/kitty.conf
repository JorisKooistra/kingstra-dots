# =============================================================================
# kitty.conf — kingstra-dots
# =============================================================================
# Kleuren worden beheerd door matugen (fase 8) via:
#   include ~/.config/kitty/colors.conf
# =============================================================================

# ---------------------------------------------------------------------------
# Lettertype
# ---------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        12.0
adjust_line_height  105%

# Ligaturen
font_features JetBrainsMonoNF-Regular +liga +calt
font_features JetBrainsMonoNF-Bold    +liga +calt

# ---------------------------------------------------------------------------
# Venster
# ---------------------------------------------------------------------------
window_padding_width    12
window_padding_height   10

hide_window_decorations yes
background_opacity      0.92
dynamic_background_opacity yes

# Cursor
cursor_shape            block
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines        10000
scrollback_pager_history_size 100

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------
repaint_delay    8
input_delay      1
sync_to_monitor  yes

# ---------------------------------------------------------------------------
# URL's
# ---------------------------------------------------------------------------
url_color           #89b4fa
url_style           curly
open_url_with       default
detect_urls         yes

# ---------------------------------------------------------------------------
# Tabbladen (voor meerdere shells in één venster)
# ---------------------------------------------------------------------------
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_title_template      "{index}: {title}"

# ---------------------------------------------------------------------------
# Toetsenbindingen
# ---------------------------------------------------------------------------
# Nieuw venster splitsen
map ctrl+shift+enter    new_window
map ctrl+shift+w        close_window
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# Nieuw tabblad
map ctrl+shift+t        new_tab
map ctrl+shift+q        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab

# Lettergrootte
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Klembord
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# ---------------------------------------------------------------------------
# Shell integratie
# ---------------------------------------------------------------------------
shell_integration       enabled

# ---------------------------------------------------------------------------
# Kleuren (matugen overschrijft dit bestand in fase 8)
# ---------------------------------------------------------------------------
# Standaard: Catppuccin Mocha
include colors.conf
