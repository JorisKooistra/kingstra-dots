# =============================================================================
# kitty.conf — Baseline config (Kingstra)
# =============================================================================

# Font (runtime overrides via kitty-runtime.conf)
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0

# Terminal feel
cursor_shape block
enable_audio_bell no
confirm_os_window_close 0
shell_integration enabled

# Visual defaults (runtime overrides via kitty-runtime.conf)
background_opacity 0.90
window_padding_width 10

# Theme includes
# Runtime bestandsnamen worden bewust buiten git gehouden om
# onbedoelde commits vanaf testmachines te voorkomen.
include ~/.config/kitty/kitty-runtime.conf
include ~/.config/kitty/skwd-theme.generated.conf
include ~/.config/kitty/kitty-matugen-colors.conf
