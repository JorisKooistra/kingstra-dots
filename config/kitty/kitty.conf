# =============================================================================
# kitty.conf — Baseline config (Kingstra)
# =============================================================================

# Font (wordt bijgewerkt door kingstra-theme-switch)
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0

# Terminal feel
cursor_shape block
enable_audio_bell no
confirm_os_window_close 0
shell_integration enabled

# Visual defaults (wordt bijgewerkt door kingstra-theme-switch)
background_opacity 0.90
window_padding_width 10

# Theme includes
# skwd-theme.conf wordt door wallpaper/matugen integratie geschreven.
# kitty-matugen-colors.conf is legacy/compat en mag leeg blijven.
include ~/.config/kitty/skwd-theme.conf
include ~/.config/kitty/kitty-matugen-colors.conf
